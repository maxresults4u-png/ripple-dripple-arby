<!DOCTYPE html>
<html>
<head>
<title>Campione Arbitrage Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: radial-gradient(circle at top, #020617, #000);
  color: #e2e8f0;
  font-family: 'Segoe UI', sans-serif;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #00f0ff;
  text-shadow: 0 0 10px #00f0ff;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: rgba(13,17,23,0.9);
  border: 1px solid #00f0ff33;
  padding: 20px;
  border-radius: 12px;
  margin-top: 15px;
  box-shadow: 0 0 15px rgba(0,255,255,0.1);
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.stat {
  font-size: 18px;
  margin: 5px 0;
}

.green { color:#00ff88; }
.red { color:#ef4444; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg,#00f0ff,#00ff88);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

</style>
</head>

<body>

<h1>⚡ Campione Arbitrage Engine</h1>

<div class="container">

<div class="grid">

<div class="card">
  <div class="stat">Balance: $<span id="balance">1000</span></div>
  <div class="stat">Profit: $<span id="profit">0</span></div>
  <div class="stat">Trades: <span id="trades">0</span></div>
</div>

<div class="card">
  <div class="stat">Threshold: <span id="threshold">0.50</span>%</div>
  <div class="stat">Avg Profit: <span id="avgProfit">0</span></div>
</div>

</div>

<div class="card">
  <div class="stat">Price A: <span id="priceA">--</span></div>
  <div class="stat">Price B: <span id="priceB">--</span></div>
  <div class="stat">Spread: <span id="spread">--</span></div>
</div>

<div class="card">
  <div>Status: <span id="status">Idle</span></div>
</div>

<button onclick="startBot()">🚀 Start Engine</button>

</div>

<script>

let balance = 1000;
let profit = 0;
let tradeHistory = [];
let running = false;

let THRESHOLD = 0.5;
const TRADE_SIZE = 100;

function updateUI(priceA, priceB, spread) {
  document.getElementById("priceA").innerText = priceA.toFixed(4);
  document.getElementById("priceB").innerText = priceB.toFixed(4);
  document.getElementById("spread").innerText = spread.toFixed(2) + "%";
  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("profit").innerText = profit.toFixed(2);
  document.getElementById("trades").innerText = tradeHistory.length;
  document.getElementById("threshold").innerText = THRESHOLD.toFixed(2);
}

function updateLearning() {
  if (tradeHistory.length < 5) return;

  let last = tradeHistory.slice(-5);
  let avg = last.reduce((sum, t) => sum + t.profit, 0) / last.length;

  document.getElementById("avgProfit").innerText = avg.toFixed(4);

  if (avg < 0) {
    THRESHOLD += 0.1;
  } else {
    THRESHOLD -= 0.05;
  }

  if (THRESHOLD < 0.3) THRESHOLD = 0.3;
  if (THRESHOLD > 2.0) THRESHOLD = 2.0;
}

async function scan() {
  try {
    const res1 = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=XRPUSDT");
    const data1 = await res1.json();

    const res2 = await fetch("https://api.kraken.com/0/public/Ticker?pair=XRPUSD");
    const data2 = await res2.json();

    const priceA = parseFloat(data1.price);
    const priceB = parseFloat(data2.result.XXRPZUSD.c[0]);

    const spread = ((priceB - priceA) / priceA) * 100;

    updateUI(priceA, priceB, spread);

    if (spread > THRESHOLD) {
      executeTrade(spread);
    }

  } catch (err) {
    document.getElementById("status").innerText = "Error";
  }
}

function executeTrade(spread) {
  document.getElementById("status").innerText = "Executing trade...";

  let realSpread = spread - 0.3;
  let profitAmount = TRADE_SIZE * (realSpread / 100);

  balance += profitAmount;
  profit += profitAmount;

  tradeHistory.push({ spread, profit: profitAmount });

  updateLearning();

  document.getElementById("status").innerText = "Trade executed";
}

function startBot() {
  if (running) return;
  running = true;

  document.getElementById("status").innerText = "Engine running...";

  setInterval(scan, 3000);
}

</script>

</body>
</html>
